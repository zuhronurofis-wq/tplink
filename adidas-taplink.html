<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adidas — Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .page {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #000;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
  }

  .bg-model {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 85%;
    z-index: 0;
    pointer-events: none;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.85) 0%,
      rgba(0,0,0,0.4) 30%,
      rgba(0,0,0,0.2) 55%,
      rgba(0,0,0,0.75) 75%,
      rgba(0,0,0,0.97) 100%
    );
    z-index: 1;
  }

  .stripe-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #fff;
    z-index: 10;
  }

  .bg-icons {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .float-icon {
    position: absolute;
    opacity: 0;
    animation: floatUp var(--dur) ease-in-out var(--delay) infinite;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.8) rotate(0deg); }
    15%  { opacity: 0.07; }
    80%  { opacity: 0.05; }
    100% { opacity: 0; transform: translateY(-120px) scale(1.1) rotate(var(--rot)); }
  }

  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 48px;
    min-height: 100vh;
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 8px;
    animation: fadeDown 0.8s ease both;
  }

  .adidas-logo svg {
    width: 72px; height: 72px;
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.25));
  }

  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    color: #fff;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 4px;
    text-shadow: 0 2px 20px rgba(255,255,255,0.15);
  }

  .tagline {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 600;
  }

  .social-links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    margin-top: 32px;
    animation: fadeUp 0.9s ease 0.2s both;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 22px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }

  .social-btn::before {
    content: '';
    position: absolute;
    left: -100%; top: 0; bottom: 0;
    width: 100%;
    background: rgba(255,255,255,0.12);
    transition: left 0.35s ease;
  }

  .social-btn:hover::before { left: 0; }
  .social-btn:hover {
    transform: translateY(-2px) scale(1.012);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }
  .social-btn:active { transform: scale(0.98); }

  .btn-ig {
    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    border: 1.5px solid rgba(255,255,255,0.18);
    color: #fff;
  }

  .btn-yt {
    background: linear-gradient(135deg, #1a0000, #280000);
    border: 1.5px solid rgba(255,60,60,0.25);
    color: #fff;
  }

  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-ig {
    background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
  }

  .icon-yt { background: #FF0000; }

  .btn-label { flex: 1; }

  .btn-sublabel {
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0;
    text-transform: none;
    display: block;
    margin-top: 2px;
  }

  .btn-arrow {
    font-size: 18px;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
  }
  .social-btn:hover .btn-arrow { opacity: 1; transform: translateX(3px); }

  .phone-section {
    margin-top: 20px;
    width: 100%;
    animation: fadeUp 1s ease 0.35s both;
  }

  .phone-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: #fff;
    color: #000;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 2px;
    transition: transform 0.18s ease, box-shadow 0.18s ease, color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .phone-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: #000;
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.35s ease;
    z-index: 0;
  }

  .phone-btn:hover::after { transform: scaleX(1); transform-origin: left; }
  .phone-btn:hover { color: #fff; box-shadow: 0 8px 28px rgba(255,255,255,0.18); }
  .phone-btn:hover .phone-icon-wrap { background: #fff; border: 1.5px solid #000; }
  .phone-btn > * { position: relative; z-index: 1; }

  .phone-icon-wrap {
    width: 36px; height: 36px;
    background: #000;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 16px;
    width: 100%;
    animation: fadeUp 1s ease 0.45s both;
  }

  .divider-line { flex: 1; height: 0.5px; background: rgba(255,255,255,0.15); }
  .divider-text {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    font-weight: 600;
  }

  .hours-section {
    width: 100%;
    animation: fadeUp 1s ease 0.5s both;
  }

  .hours-card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }

  .hours-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #fff;
  }

  .hours-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s ease infinite;
    flex-shrink: 0;
  }

  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.06);
  }
  .hours-row:last-child { border-bottom: none; padding-bottom: 0; }

  .days-label {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .time-badge {
    background: #fff;
    color: #000;
    padding: 4px 12px;
    border-radius: 2px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
  }

  .closed-badge {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.35);
    padding: 4px 12px;
    border-radius: 2px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .footer {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: fadeUp 1s ease 0.6s both;
  }

  .footer-logo svg { opacity: 0.2; width: 36px; }
  .footer-text {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
    50%       { box-shadow: 0 0 0 5px rgba(74,222,128,0); }
  }
</style>
</head>
<body>
<div class="page">
  <div class="stripe-top"></div>

  <div class="bg-icons" id="bgIcons"></div>

  <!-- Background model SVG -->
  <div class="bg-model">
    <svg viewBox="0 0 480 700" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="modelGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.95"/>
          <stop offset="50%" stop-color="#111" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#000" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <ellipse cx="240" cy="95" rx="42" ry="50" fill="#1e1e1e"/>
      <rect x="222" y="138" width="36" height="30" rx="4" fill="#1e1e1e"/>
      <path d="M155 168 L240 158 L325 168 L345 200 L360 340 L340 340 L335 280 L330 460 L150 460 L145 280 L140 340 L120 340 L135 200 Z" fill="#1a1a1a"/>
      <g opacity="0.6">
        <rect x="326" y="185" width="8" height="120" rx="4" fill="#fff" transform="rotate(8,330,245)"/>
        <rect x="337" y="185" width="8" height="120" rx="4" fill="#fff" transform="rotate(8,341,245)"/>
        <rect x="348" y="185" width="8" height="120" rx="4" fill="#fff" transform="rotate(8,352,245)"/>
      </g>
      <line x1="240" y1="168" x2="240" y2="320" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <rect x="255" y="205" width="30" height="20" rx="3" fill="rgba(255,255,255,0.06)"/>
      <path d="M155 168 L105 210 L98 320 L125 325 L138 240 L155 220 Z" fill="#1a1a1a"/>
      <path d="M325 168 L375 210 L382 320 L355 325 L362 240 L345 220 Z" fill="#1a1a1a"/>
      <path d="M150 460 L145 620 L195 622 L240 510 L285 622 L335 620 L330 460 Z" fill="#141414"/>
      <g opacity="0.4">
        <rect x="150" y="465" width="6" height="150" rx="3" fill="#fff"/>
        <rect x="158" y="465" width="6" height="150" rx="3" fill="#fff"/>
        <rect x="166" y="465" width="6" height="150" rx="3" fill="#fff"/>
      </g>
      <g opacity="0.4">
        <rect x="324" y="465" width="6" height="150" rx="3" fill="#fff"/>
        <rect x="316" y="465" width="6" height="150" rx="3" fill="#fff"/>
        <rect x="308" y="465" width="6" height="150" rx="3" fill="#fff"/>
      </g>
      <ellipse cx="183" cy="635" rx="45" ry="18" fill="#111"/>
      <ellipse cx="297" cy="635" rx="45" ry="18" fill="#111"/>
      <rect x="143" y="642" width="80" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      <rect x="257" y="642" width="80" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      <rect x="0" y="0" width="480" height="700" fill="url(#modelGrad)" opacity="0.5"/>
    </svg>
  </div>

  <div class="bg-gradient"></div>

  <div class="content">
    <!-- Logo -->
    <div class="logo-area">
      <div class="adidas-logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="20" y="72" width="18" height="22" rx="2" fill="white"/>
          <rect x="41" y="48" width="18" height="46" rx="2" fill="white"/>
          <rect x="62" y="25" width="18" height="69" rx="2" fill="white"/>
          <rect x="12" y="91" width="76" height="5" rx="2" fill="white" opacity="0.35"/>
        </svg>
      </div>
      <div class="brand-name">Adidas</div>
      <div class="tagline">Impossible is Nothing</div>
    </div>

    <!-- Social buttons -->
    <div class="social-links">
      <a href="https://www.instagram.com/adidas/" class="social-btn btn-ig" target="_blank" rel="noopener">
        <div class="btn-icon icon-ig">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="2" width="20" height="20" rx="6" stroke="white" stroke-width="2"/>
            <circle cx="12" cy="12" r="4" stroke="white" stroke-width="2"/>
            <circle cx="17.5" cy="6.5" r="1.5" fill="white"/>
          </svg>
        </div>
        <div class="btn-label">
          Instagram
          <span class="btn-sublabel">@adidas — Rasmiy sahifa</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <a href="https://www.youtube.com/@adidas" class="social-btn btn-yt" target="_blank" rel="noopener">
        <div class="btn-icon icon-yt">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="5" width="20" height="14" rx="4" fill="white"/>
            <polygon points="10,9 16,12 10,15" fill="#FF0000"/>
          </svg>
        </div>
        <div class="btn-label">
          YouTube
          <span class="btn-sublabel">Adidas — Rasmiy kanal</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>
    </div>

    <!-- Phone -->
    <div class="phone-section">
      <a href="tel:+998901252525" class="phone-btn">
        <div class="phone-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M5 4h4l2 5-2.5 1.5a11 11 0 005 5L15 13l5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2" fill="white"/>
          </svg>
        </div>
        <span style="flex:1">90 125 25 25</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="opacity:.5">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Ish vaqti</span>
      <div class="divider-line"></div>
    </div>

    <!-- Hours -->
    <div class="hours-section">
      <div class="hours-card">
        <div class="hours-title">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Hozir ochiq</span>
        </div>
        <div class="hours-row">
          <span class="days-label">Dushanba — Shanba</span>
          <span class="time-badge">09:00 – 20:00</span>
        </div>
        <div class="hours-row">
          <span class="days-label">Yakshanba</span>
          <span class="closed-badge">Dam olish</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-logo">
        <svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg" fill="white">
          <rect x="10" y="28" width="14" height="10" rx="1"/>
          <rect x="27" y="18" width="14" height="20" rx="1"/>
          <rect x="44" y="8" width="14" height="30" rx="1"/>
        </svg>
      </div>
      <div class="footer-text">© 2025 Adidas AG</div>
    </div>
  </div>
</div>

<script>
// Floating background icons
const bgIcons = document.getElementById('bgIcons');
const icons = [
  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="6" stroke="white" stroke-width="1.5"/><circle cx="12" cy="12" r="4" stroke="white" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1" fill="white"/></svg>`,
  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="4" stroke="white" stroke-width="1.5"/><polygon points="10,9 16,12 10,15" fill="white" opacity="0.7"/></svg>`,
  `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 005 5L15 13l5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2" stroke="white" stroke-width="1.5"/></svg>`,
  `<svg width="22" height="22" viewBox="0 0 22 22"><rect x="2" y="12" width="5" height="8" rx="1" fill="white"/><rect x="9" y="7" width="5" height="13" rx="1" fill="white"/><rect x="16" y="2" width="5" height="18" rx="1" fill="white"/></svg>`
];
const positions = ['8%','20%','35%','50%','65%','78%','90%','12%','55%','42%','70%','25%'];
positions.forEach((left, i) => {
  const div = document.createElement('div');
  div.className = 'float-icon';
  div.innerHTML = icons[i % icons.length];
  div.style.left = left;
  div.style.bottom = Math.floor(Math.random() * 40) + '%';
  div.style.setProperty('--dur', (8 + Math.random() * 10).toFixed(1) + 's');
  div.style.setProperty('--delay', (Math.random() * 8).toFixed(1) + 's');
  div.style.setProperty('--rot', (Math.random() * 40 - 20).toFixed(0) + 'deg');
  bgIcons.appendChild(div);
});

// Live status
function updateStatus() {
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours() + now.getMinutes() / 60;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const isSunday = day === 0;
  const isOpen = !isSunday && hour >= 9 && hour < 20;
  if (dot && txt) {
    dot.style.background = isOpen ? '#4ade80' : '#f87171';
    txt.textContent = isOpen ? 'Hozir ochiq' : (isSunday ? 'Dam olish kuni' : 'Hozir yopiq');
  }
}
updateStatus();
</script>
</body>
</html>
